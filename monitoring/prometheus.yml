# ============================================================
# Prometheus Configuration
# Scrapes metrics from the Spring Boot application every 15s
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator Prometheus endpoint
  - job_name: 'ride-sharing-platform'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'ride-sharing-platform'
          environment: 'dev'
