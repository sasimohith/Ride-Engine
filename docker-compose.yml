version: '3.8'

# ============================================================
# docker-compose up  — starts ALL infrastructure services
# docker-compose down — stops everything and removes containers
# docker-compose down -v — also removes data volumes (fresh start)
# ============================================================

services:

  # ── PostgreSQL: Primary database ──
  postgres:
    image: postgres:16-alpine
    container_name: ridesharing-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ridesharing_dev
      POSTGRES_USER: ridesharing
      POSTGRES_PASSWORD: ridesharing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridesharing -d ridesharing_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis: Caching + GEO + Temporary data ──
  redis:
    image: redis:7-alpine
    container_name: ridesharing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper: Required by Kafka for cluster coordination ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ridesharing-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka: Event streaming platform ──
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ridesharing-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Prometheus: Metrics collection ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ridesharing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana: Dashboards and visualization ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ridesharing-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
