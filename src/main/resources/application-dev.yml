# ============================================================
# DEV PROFILE — Local development with Docker containers
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ridesharing_dev
    username: ${DB_USERNAME:ridesharing}
    password: ${DB_PASSWORD:ridesharing}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# JWT configuration — use environment variables in production
jwt:
  secret: ${JWT_SECRET:myDefaultSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    com.ridesharing: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
